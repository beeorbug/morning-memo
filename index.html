<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스타트업 모닝 메모 포털</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    header .subtitle { font-size: 0.85rem; color: #64748b; margin-top: 2px; }
    .badge { background: #3b82f6; color: #fff; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; letter-spacing: 0.05em; }
    main { max-width: 860px; margin: 0 auto; padding: 40px 24px; }
    #empty-state { text-align: center; padding: 80px 24px; color: #475569; }
    #empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    #empty-state p { font-size: 1rem; }
    .memo-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; transition: border-color 0.2s; }
    .memo-card:hover { border-color: #475569; }
    .memo-card .date { font-size: 0.75rem; color: #64748b; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .stories-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .story-chip { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; }
    .story-chip .code { color: #fbbf24; font-weight: 700; margin-right: 6px; }
    .story-chip .company { color: #94a3b8; font-weight: 600; margin-right: 6px; }
    .story-chip .headline { color: #cbd5e1; }
    .slides-link { display: inline-flex; align-items: center; gap: 8px; background: #3b82f6; color: #fff; text-decoration: none; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
    .slides-link:hover { background: #2563eb; }
    footer { text-align: center; padding: 40px 24px 24px; color: #334155; font-size: 0.75rem; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>📰 스타트업 모닝 메모</h1>
    <div class="subtitle">매일 아침 글로벌 스타트업 인사이트</div>
  </div>
  <span class="badge">PORTAL</span>
</header>
<main>
  <div id="memo-list"></div>
  <div id="empty-state" style="display:none;">
    <div class="icon">🗂️</div>
    <p>아직 등록된 메모가 없습니다.<br>첫 번째 모닝 메모를 생성해 보세요!</p>
  </div>
</main>
<footer>자동 생성 · Claude 모닝 메모 시스템</footer>
<script>
  async function loadMemos() {
    let memos = [];
    try {
      const res = await fetch('memos.json?t=' + Date.now());
      memos = await res.json();
    } catch (e) { console.warn('memos.json load failed', e); }
    const list = document.getElementById('memo-list');
    const empty = document.getElementById('empty-state');
    if (!memos || memos.length === 0) { empty.style.display = 'block'; return; }
    memos.forEach(memo => {
      const card = document.createElement('div');
      card.className = 'memo-card';
      const dateStr = memo.date || '날짜 없음';
      const stories = (memo.stories || []).map(s =>
        '<span class="story-chip"><span class="code">'+s.code+'</span><span class="company">'+s.company+'</span><span class="headline">'+s.headline+'</span></span>'
      ).join('');
      card.innerHTML = '<div class="date">📅 '+dateStr+'</div><div class="stories-list">'+(stories||'<span style="color:#475569;font-size:0.8rem;">스토리 정보 없음</span>')+'</div><a class="slides-link" href="'+(memo.slides_url||'#')+'" target="_blank" rel="noopener">📊 슬라이드 보기 →</a>';
      list.appendChild(card);
    });
  }
  loadMemos();
</script>
</body>
</html>
