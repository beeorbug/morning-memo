<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>스타트업 모닝 메모 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#E8D9BB;min-height:100vh;padding:32px 16px}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:120px;font-weight:900;color:rgba(180,140,80,0.07);pointer-events:none;white-space:nowrap;z-index:0}
.container{max-width:860px;margin:0 auto;position:relative;z-index:1}
header{text-align:center;margin-bottom:40px}
.stamp{display:inline-block;border:3px solid #8B2020;color:#8B2020;border-radius:4px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:2px;transform:rotate(-2deg);margin-bottom:12px;opacity:0.85}
h1{font-size:2rem;font-weight:900;color:#3D2A18;letter-spacing:-0.5px}
h1 span{color:#8B7355;font-size:1rem;font-weight:500;display:block;margin-top:4px}
.today-label{display:inline-block;background:#1A4F8A;color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:1px}
.memo-card{background:#FFFDF7;border-radius:10px;box-shadow:6px 6px 0 #C4A882;margin-bottom:28px;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s}
.memo-card:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 #C4A882}
.card-stripe{height:5px;display:flex}
.card-stripe span{flex:1}
.card-body{padding:20px 24px 16px}
.card-date{font-size:12px;color:#8B7355;font-style:italic;margin-bottom:10px}
.story-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.story-row{display:flex;align-items:flex-start;gap:8px;font-size:13px}
.story-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.story-company{font-weight:700;color:#1A1A1A;flex-shrink:0}
.story-headline{color:#555;font-size:12px}
.card-footer{display:flex;justify-content:flex-end;padding-top:12px;border-top:1px solid #EEE8DB}
.slides-btn{display:inline-flex;align-items:center;gap:6px;background:#1A4F8A;color:#fff;text-decoration:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;transition:background 0.2s}
.slides-btn:hover{background:#0D3266}
.empty{text-align:center;padding:60px 20px;color:#8B7355;font-size:1.1rem}
footer{text-align:center;margin-top:40px;color:#8B7355;font-size:12px;opacity:0.7}
</style>
</head>
<body>
<div class="watermark">MORNING MEMO</div>
<div class="container">
  <header>
    <div class="stamp">STARTUP &middot; MEMO &middot; DAILY</div>
    <h1>스타트업 모닝 메모 <span>매일 아침, 글로벌 스타트업 인사이트</span></h1>
  </header>
  <div id="memo-list"></div>
  <footer>beeorbug &middot; 스타트업 모닝 메모 포털</footer>
</div>
<script>
var COLORS = {
  '테크 #1':{bg:'#D3E8FA',text:'#1A4F8A'},
  '테크 #2':{bg:'#EEE0FF',text:'#6B2FA0'},
  '테크 #3':{bg:'#FFE8CC',text:'#B85C00'},
  '테크 #4':{bg:'#D0F0E8',text:'#0D6B50'},
  '생명과학':{bg:'#D2EDDC',text:'#1A6B3A'}
};
var STRIPES = ['#1A4F8A','#6B2FA0','#B85C00','#1A6B3A'];
function load() {
  var list = document.getElementById('memo-list');
  fetch('./memos.json').then(function(r){return r.json();}).then(function(memos){
    if (!memos||memos.length===0){
      list.innerHTML='<div class="empty">아직 등록된 메모가 없습니다.</div>';
      return;
    }
    memos.forEach(function(memo,i){
      var isToday = i===0;
      var cards = memo.cards||[];
      var stripes = cards.map(function(c,j){
        var col = COLORS[c.tag];
        return '<span style="background:'+(col?col.text:STRIPES[j%STRIPES.length])+'"></span>';
      }).join('');
      var stories = cards.map(function(c){
        var col = COLORS[c.tag]||{bg:'#eee',text:'#333'};
        return '<div class="story-row"><span class="story-tag" style="background:'+col.bg+';color:'+col.text+'">'+c.tag+'</span><span class="story-company">'+c.company+'</span><span class="story-headline">&mdash; '+c.headline+'</span></div>';
      }).join('');
      var url = memo.url||'';
      var div = document.createElement('div');
      div.className='memo-card';
      div.innerHTML=(isToday?'<div style="padding:6px 24px 0"><span class="today-label">오늘</span></div>':'')+
        '<div class="card-stripe">'+stripes+'</div>'+
        '<div class="card-body">'+
          '<div class="card-date">'+(memo.dateKo||memo.date)+' | Morning Memo</div>'+
          '<div class="story-list">'+stories+'</div>'+
          '<div class="card-footer">'+
            '<a class="slides-btn" target="_blank" rel="noopener noreferrer">&#128202; 슬라이드 보기 &rarr;</a>'+
          '</div>'+
        '</div>';
      var btn = div.querySelector('.slides-btn');
      btn.href = url;
      list.appendChild(div);
    });
  }).catch(function(){
    list.innerHTML='<div class="empty">오류가 발생했습니다.</div>';
  });
}
load();
</script>
</body>
</html>
