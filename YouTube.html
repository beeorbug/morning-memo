<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beeorbug YouTube</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #F0F4F8;
      color: #1F2937;
      min-height: 100vh;
    }

    .site-header {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 28px 24px 24px;
    }

    .site-header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .site-title span { color: #2563EB; }

    .site-nav {
      display: flex;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #E5E7EB;
      background: #FFFFFF;
      color: #374151;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .nav-link.active {
      background: #EFF6FF;
      border-color: #BFDBFE;
      color: #1D4ED8;
    }

    .site-tagline {
      width: 100%;
      font-size: 0.8rem;
      color: #6B7280;
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 767px) {
      .video-grid { grid-template-columns: 1fr; }
    }

    .video-card {
      background: #FFFFFF;
      border-radius: 14px;
      border: 1px solid #E5E7EB;
      overflow: hidden;
    }

    .video-embed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    .video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-body {
      padding: 16px;
    }

    .video-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .video-desc {
      font-size: 0.9rem;
      color: #6B7280;
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: #9CA3AF;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="site-header-inner">
    <h1 class="site-title">Beeorbug <span>YouTube</span></h1>

    <div class="site-nav">
      <a href="/" class="nav-link">Morning Memo</a>
      <a href="/YouTube.html" class="nav-link active">들어보자</a>
    </div>

    <p class="site-tagline">Morning Memo commentary</p>
  </div>
</header>

<main class="main">
  <section class="video-grid" id="videoGrid">
    <div class="loading">불러오는 중…</div>
  </section>
</main>

<script>
const VIDEO_URL = 'videos.json';

function renderVideo(video) {
  return `
    <article class="video-card">
      <div class="video-embed">
        <iframe
          src="https://www.youtube.com/embed/${video.videoId}"
          title="${video.title}"
          allowfullscreen>
        </iframe>
      </div>
      <div class="video-body">
        <div class="video-title">${video.title}</div>
        <div class="video-desc">${video.desc || ''}</div>
      </div>
    </article>
  `;
}

fetch(VIDEO_URL + '?_=' + Date.now())
  .then(res => res.json())
  .then(videos => {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = videos.map(renderVideo).join('');
  })
  .catch(() => {
    document.getElementById('videoGrid').innerHTML = '영상 불러오기 실패';
  });
</script>

</body>
</html>
